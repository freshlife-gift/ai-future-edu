<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 미래교육 지식의 창</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 잠금 -->
  <div id="lockScreen" class="lock-screen">
    <div class="lock-box">
      <span class="lock-box__icon">🔒</span>
      <h2 class="lock-box__title">AI 미래교육 지식의 창</h2>
      <p class="lock-box__sub">서울특별시교육청 AI미래교육팀 내부용</p>
      <form id="lockForm" class="lock-form" onsubmit="return false">
        <input type="password" id="lockPassword" class="lock-input" placeholder="비밀번호 입력" autocomplete="off">
        <button type="submit" class="lock-btn">입장</button>
      </form>
      <p id="lockError" class="lock-error" style="display:none">비밀번호가 올바르지 않습니다</p>
    </div>
  </div>

  <div class="bg-orb bg-orb--1"></div>
  <div class="bg-orb bg-orb--2"></div>
  <div class="bg-orb bg-orb--3"></div>

  <!-- 헤더 -->
  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <span class="header__icon">🧠</span>
        <div>
          <h1 class="header__title">AI 미래교육 지식의 창</h1>
          <p class="header__sub">서울특별시교육청 창의미래교육과 AI미래교육팀</p>
        </div>
      </div>
      <p class="header__updated" id="lastUpdated">업데이트 확인 중...</p>
    </div>
  </header>

  <!-- 검색 (탭 위) -->
  <div class="search-bar">
    <div class="search-bar__inner">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 키워드로 전체 자료 검색...">
      <button id="searchClear" class="search-clear" style="display:none">✕</button>
    </div>
  </div>

  <!-- 탭 (순서: 뉴스 > 학술지 > 해외동향 > 정책 > 연구보고서) -->
  <nav class="tab-nav">
    <div class="tab-nav__inner">
      <button class="tab-btn tab-btn--active" data-section="news">
        <span class="tab-btn__icon">📰</span> 뉴스기사
        <span class="tab-btn__badge" id="badge-news">0</span>
      </button>
      <button class="tab-btn" data-section="academic">
        <span class="tab-btn__icon">📖</span> 학술지
        <span class="tab-btn__badge" id="badge-academic">0</span>
      </button>
      <button class="tab-btn" data-section="global_trends">
        <span class="tab-btn__icon">🌏</span> 해외동향
        <span class="tab-btn__badge" id="badge-global_trends">0</span>
      </button>
      <button class="tab-btn" data-section="policy">
        <span class="tab-btn__icon">📋</span> 정책
        <span class="tab-btn__badge" id="badge-policy">0</span>
      </button>
      <button class="tab-btn" data-section="reports">
        <span class="tab-btn__icon">📚</span> 연구보고서
        <span class="tab-btn__badge" id="badge-reports">0</span>
      </button>
    </div>
  </nav>

  <!-- 학술지 서브탭 -->
  <nav id="subTabNav" class="sub-tab-nav" style="display:none">
    <div class="sub-tab-nav__inner">
      <button class="sub-tab-btn sub-tab-btn--active" data-sub="academic_domestic">📖 국내학술지
        <span class="sub-tab-btn__badge" id="badge-academic_domestic">0</span>
      </button>
      <button class="sub-tab-btn" data-sub="academic_international">🌐 해외학술지
        <span class="sub-tab-btn__badge" id="badge-academic_international">0</span>
      </button>
    </div>
  </nav>

  <!-- 메인 -->
  <main class="main">
    <div id="cardsContainer" class="cards-container"></div>
    <div id="loadingState" class="state-msg" style="display:none"><div class="spinner"></div><p>자료를 불러오는 중...</p></div>
    <div id="emptyState" class="state-msg" style="display:none"><span class="state-msg__icon">📭</span><p>해당 자료가 없습니다</p></div>
    <div id="errorState" class="state-msg" style="display:none"><span class="state-msg__icon">⚠️</span><p id="errorMsg">데이터를 불러올 수 없습니다</p></div>
  </main>

  <footer class="footer">
    <p>서울특별시교육청 창의미래교육과 AI미래교육팀</p>
    <p class="footer__disclaimer">⚠ 본 페이지는 AI가 자동 분석한 결과이므로 참고용으로 활용해주세요.</p>
    <p class="footer__copy">© 2026 AI 미래교육 지식의 창 · 매일 오전 6:30 자동 업데이트</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
